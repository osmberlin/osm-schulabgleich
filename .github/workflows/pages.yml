name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily ~07:00 CET / ~08:00 CEST — JedeSchule-CSV + Overpass neu laden, Abgleich nur bei beiden OK
    - cron: '0 6 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Validate committed snapshot baseline
        run: |
          test -f public/datasets/summary.json
          test -f public/datasets/status/runs.json
      - run: bun run pipeline
        env:
          GITHUB_SHA: ${{ github.sha }}
      - name: Validate pipeline snapshot outputs
        run: |
          bun -e "JSON.parse(await Bun.file('public/datasets/summary.json').text())"
          bun -e "JSON.parse(await Bun.file('public/datasets/status/runs.json').text())"
          test -f public/datasets/schools_official_de.meta.json
          test -f public/datasets/schools_osm_de.meta.json
          test -f public/datasets/jedeschule_stats.json
      - name: Commit snapshot files to main
        run: |
          git add public/datasets/summary.json
          git add public/datasets/status/runs.json
          git add public/datasets/schools_official_de.meta.json
          git add public/datasets/schools_osm_de.meta.json
          git add public/datasets/jedeschule_stats.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Cron: update pipeline snapshot [skip ci]"
            git push origin HEAD:main
          fi
      - name: Build from committed main snapshot
        run: |
          git fetch origin main
          git reset --hard origin/main
      - run: bun run build
        env:
          GITHUB_PAGES: 'true'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

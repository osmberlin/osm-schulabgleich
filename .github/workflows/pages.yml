name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Sunday ~07:00 CET / ~08:00 CEST (Europe/Berlin), i.e. day after typical jedeschule.codefor.de Saturday CSV drop
    - cron: '0 6 * * 0'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Restore previous datasets (national *_de.* + per-land cache / fallback)
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-prev
      - name: Seed datasets from gh-pages (incl. schools_osm_de / per-land)
        continue-on-error: true
        run: |
          if [ -d gh-pages-prev/datasets ]; then
            mkdir -p public/datasets
            rsync -a gh-pages-prev/datasets/ public/datasets/ || true
          fi
      - run: bun run pipeline
        env:
          GITHUB_SHA: ${{ github.sha }}
      - run: bun run build
        env:
          GITHUB_PAGES: 'true'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

name: Refresh Datasets

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DATASET_ARTIFACT_NAME: datasets-last-good

concurrency:
  group: refresh-datasets-main
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
        env:
          HUSKY: '0'

      - name: Refresh official source (JedeSchule)
        run: bun run pipeline:download:jedeschule
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Refresh OSM source
        run: bun run pipeline:download:osm
        env:
          GITHUB_SHA: ${{ github.sha }}
          OVERPASS_FETCH_RELAX_TLS: 'true'

      - name: Check OSM source metadata
        id: osm-meta-precheck
        run: bun run pipeline:ci:osm-meta-precheck

      - name: Download previous datasets artifact for OSM fallback
        if: steps.osm-meta-precheck.outputs.osm_ok != 'true'
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: data-refresh.yml
          branch: main
          name: ${{ env.DATASET_ARTIFACT_NAME }}
          search_artifacts: true
          path: .artifact-restore
          if_no_artifact_found: warn

      - name: Restore only OSM cache inputs from artifact
        if: steps.osm-meta-precheck.outputs.osm_ok != 'true'
        run: bun run pipeline:ci:restore-osm-cache

      - name: Retry OSM source after cache restore
        if: steps.osm-meta-precheck.outputs.osm_ok != 'true'
        run: bun run pipeline:download:osm
        env:
          GITHUB_SHA: ${{ github.sha }}
          OVERPASS_FETCH_RELAX_TLS: 'true'

      - name: Validate source metadata before rebuild
        run: bun run pipeline:ci:validate-source-meta

      - name: Rebuild derived datasets
        run: bun run pipeline:rebuild
        env:
          GITHUB_SHA: ${{ github.sha }}
          PIPELINE_RUN_CONTEXT: ${{ github.event_name == 'workflow_dispatch' && 'refresh_manual_nightly' || 'refresh_scheduled_nightly' }}

      - name: Validate rebuilt snapshot
        run: bun run pipeline:ci:validate-rebuilt-snapshot

      - name: Upload reusable dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DATASET_ARTIFACT_NAME }}
          path: public/datasets
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7
